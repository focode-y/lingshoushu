<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/common.css'><title>请求书列表</title></head><body><script src='/common.js'></script><script>
shell('请求书列表','request-list',`<div class='card'><div class='row'><select id='status'><option value=''>全部</option><option value='saved'>已保存</option><option value='sent'>已发送</option></select><input id='from' type='date'><input id='to' type='date'><input id='q' placeholder='编号/客户'><button onclick='load()'>查询</button></div><table><thead><tr><th>ID</th><th>编码</th><th>客户</th><th>日期</th><th>状态</th><th>金额</th><th>保存时间</th><th>操作人</th><th>发送时间</th></tr></thead><tbody id='tb'></tbody></table></div>`);
async function load(){const p=new URLSearchParams({status:status.value,from:from.value,to:to.value,q:q.value});const r=await api('/api/requests?'+p.toString());if(!r.ok)return;tb.innerHTML='';r.data.forEach(x=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${x.id}</td><td>${x.doc_no}</td><td>${x.customer_name}</td><td>${x.doc_date}</td><td>${x.status}</td><td>${fmt(x.total)}</td><td>${x.saved_at||x.created_at||''}</td><td>${x.saved_by||''}</td><td>${x.sent_at||''}</td>`;tb.appendChild(tr);});}
load();
</script></body></html>
