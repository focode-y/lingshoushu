<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/common.css'><title>公司信息预设</title></head><body><script src='/common.js'></script><script>
shell('公司信息预设','company',`<div class='card'><div class='row'><input id='company_name' placeholder='公司名'><input id='address' placeholder='地址'><input id='phone' placeholder='电话'><input id='registration_no' placeholder='T1234567890123（T+13桁）' maxlength='14'></div><textarea id='bank_info' placeholder='银行信息' style='width:100%;min-height:80px'></textarea><div class='row'><input id='stamp' type='file' accept='image/png'><button onclick='save()'>保存资料</button><button onclick='up()'>上传印章</button></div><img id='pv' style='max-width:120px;max-height:120px'></div>`);
async function load(){const r=await api('/api/company');if(!r.ok)return;company_name.value=r.data.company_name||'';address.value=r.data.address||'';phone.value=r.data.phone||'';registration_no.value=r.data.registration_no||'';bank_info.value=r.data.bank_info||'';pv.src=r.data.stamp_path||'';}
async function save(){const reg=registration_no.value.trim();if(reg&&!/^T\d{13}$/.test(reg)){alert('登録番号の形式が正しくありません。T+13桁の数字で入力してください（例: T1234567890123）');return;}const r=await api('/api/company','PUT',{company_name:company_name.value,address:address.value,phone:phone.value,registration_no:reg,bank_info:bank_info.value});alert(r.ok?'已保存':(r.data.error||'失败'));}
async function up(){if(!stamp.files[0])return;const fd=new FormData();fd.append('stamp',stamp.files[0]);const r=await fetch('/api/company/stamp',{method:'POST',headers:authHeaders(),body:fd});const d=await r.json();if(r.ok){pv.src=d.stamp_path;alert('已上传');}}
load();
</script></body></html>
