<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/common.css'><title>账号管理</title></head><body><script src='/common.js'></script><script>
shell('账号管理','account',`<div class='card'><h2>修改密码</h2><div class='row'><input id='oldp' type='password' placeholder='旧密码'><input id='newp' type='password' placeholder='新密码'><button onclick='chg()'>修改</button></div><div id='msg' class='muted'></div></div>`);
async function chg(){const r=await api('/api/account/change-password','POST',{oldPassword:oldp.value,newPassword:newp.value});msg.textContent=r.ok?'密码已修改':(r.data.error||'失败');}
</script></body></html>
